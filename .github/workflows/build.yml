name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: compiler

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod
          cache-dependency-path: compiler/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build compiler binaries
        run: go build ./cmd/dcl ./cmd/dcl-lsp ./cmd/dcl-mcp

      - name: Run tests
        run: go test ./...

  validate-website-examples:
    name: Validate Website Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod
          cache-dependency-path: compiler/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Validate published DCL examples
        run: npm run validate:examples
        working-directory: website

  package-vscode-extension:
    name: Package VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/vscode-extension/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod
          cache-dependency-path: compiler/go.mod

      - name: Install extension dependencies
        run: npm ci
        working-directory: tools/vscode-extension

      - name: Sync extension version
        run: npm run sync:vscode-version
        working-directory: tools/vscode-extension

      - name: Validate repository versions
        run: npm run validate:versions
        working-directory: tools/vscode-extension

      - name: Compile extension
        run: npm run compile
        working-directory: tools/vscode-extension

      - name: Test extension
        run: npm test
        working-directory: tools/vscode-extension

      - name: Package extension
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npm run build:compiler-binaries
          npm run copy:vendor
          npx vsce package --out "dcl-vscode-extension-v${VERSION}.vsix"
          echo "VSIX_PATH=tools/vscode-extension/dcl-vscode-extension-v${VERSION}.vsix" >> "$GITHUB_ENV"
          echo "VSIX_ARTIFACT=dcl-vscode-extension-v${VERSION}" >> "$GITHUB_ENV"
        working-directory: tools/vscode-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.VSIX_ARTIFACT }}
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error
