name: Release VS Code Extension

on:
  push:
    tags:
      - "vscode-extension-v*"

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX and Attach Release Asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/vscode-extension/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: compiler/go.mod
          cache-dependency-path: compiler/go.mod

      - name: Install extension dependencies
        run: npm ci
        working-directory: tools/vscode-extension

      - name: Sync extension version
        run: npm run sync:vscode-version
        working-directory: tools/vscode-extension

      - name: Validate repository versions
        run: npm run validate:versions
        working-directory: tools/vscode-extension

      - name: Test extension
        run: npm test
        working-directory: tools/vscode-extension

      - name: Compile extension
        run: npm run compile
        working-directory: tools/vscode-extension

      - name: Package extension
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npx vsce package --out "dcl-vscode-extension-v${VERSION}.vsix"
          echo "VSIX_PATH=tools/vscode-extension/dcl-vscode-extension-v${VERSION}.vsix" >> "$GITHUB_ENV"
          echo "VSIX_NAME=dcl-vscode-extension-v${VERSION}.vsix" >> "$GITHUB_ENV"
          echo "VSIX_ARTIFACT=dcl-vscode-extension-v${VERSION}" >> "$GITHUB_ENV"
        working-directory: tools/vscode-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VSIX_ARTIFACT }}
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$VSIX_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$VSIX_PATH" --title "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
